<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极速预测 · 马前刻</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap');

    :root {
      --gold: #C9973B;
      --gold-light: #E8C97A;
      --gold-deep: #8B6914;
      --cinnabar: #C0392B;
      --lapis: #1A3A5C;
      --lapis-light: #2C5282;
      --sand: #F5E6C8;
      --sand-deep: #D4B896;
      --ink: #1A1208;
      --malachite: #2E7D53;
      --vermilion: #D4500A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--lapis);
      color: var(--sand);
      font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', 'STKaiti', 'KaiTi', serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(201,151,59,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(192,57,43,0.10) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9973B' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* 顶部装饰纹 */
    .top-border {
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, var(--lapis), var(--gold), var(--cinnabar), var(--gold), var(--lapis));
    }

    /* 云纹装饰 */
    .cloud-strip {
      width: 100%;
      text-align: center;
      font-size: 22px;
      color: rgba(201,151,59,0.35);
      letter-spacing: 8px;
      padding: 6px 0 2px;
      user-select: none;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 36px 0 20px;
      position: relative;
    }

    .header::before, .header::after {
      content: '◈';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      color: var(--gold);
      opacity: 0.6;
    }
    .header::before { left: 0; }
    .header::after { right: 0; }

    .logo-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold-deep), var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 52px;
      letter-spacing: 6px;
      line-height: 1.1;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(201,151,59,0.5));
    }

    .subtitle {
      color: var(--sand-deep);
      font-size: 16px;
      letter-spacing: 4px;
      margin-top: 8px;
      opacity: 0.85;
    }

    .tagline {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 20px;
      border: 1px solid rgba(201,151,59,0.4);
      border-radius: 2px;
      color: var(--gold-light);
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.8;
    }

    /* 分割线 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .divider-icon {
      color: var(--gold);
      font-size: 18px;
    }

    /* 主卡片 */
    .main-card {
      background: linear-gradient(160deg, rgba(26,58,92,0.95) 0%, rgba(15,35,60,0.98) 100%);
      border: 1px solid rgba(201,151,59,0.3);
      border-radius: 4px;
      padding: 36px 40px;
      box-shadow:
        0 0 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(201,151,59,0.15),
        0 0 0 1px rgba(201,151,59,0.08);
      position: relative;
      overflow: hidden;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='100' r='80' stroke='%23C9973B' stroke-width='0.3' fill='none' opacity='0.08'/%3E%3Ccircle cx='100' cy='100' r='60' stroke='%23C9973B' stroke-width='0.3' fill='none' opacity='0.06'/%3E%3C/svg%3E") center/300px no-repeat;
      pointer-events: none;
    }

    /* 角花 */
    .corner { position: absolute; width: 40px; height: 40px; }
    .corner-tl { top: 8px; left: 8px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); opacity: 0.5; }
    .corner-tr { top: 8px; right: 8px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); opacity: 0.5; }
    .corner-bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); opacity: 0.5; }
    .corner-br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); opacity: 0.5; }

    /* 当前时间 */
    .time-display {
      text-align: center;
      margin-bottom: 28px;
      padding: 14px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(201,151,59,0.15);
      border-radius: 3px;
    }
    .time-solar {
      font-size: 13px;
      color: var(--sand-deep);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .time-lunar {
      font-size: 15px;
      color: var(--gold-light);
      letter-spacing: 3px;
    }

    /* 输入区 */
    .input-label {
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 3px;
      margin-bottom: 12px;
      display: block;
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,151,59,0.3);
      border-radius: 3px;
      color: var(--sand);
      font-family: inherit;
      font-size: 16px;
      padding: 16px 20px;
      resize: vertical;
      min-height: 100px;
      line-height: 1.8;
      letter-spacing: 1px;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(201,151,59,0.7);
      box-shadow: 0 0 16px rgba(201,151,59,0.12);
    }

    textarea::placeholder {
      color: rgba(213,190,152,0.4);
      font-size: 14px;
    }

    /* 按钮 */
    .btn-predict {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold-deep) 0%, var(--gold) 50%, var(--gold-light) 100%);
      border: none;
      border-radius: 3px;
      color: var(--ink);
      font-family: inherit;
      font-size: 18px;
      letter-spacing: 6px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(201,151,59,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      overflow: hidden;
    }

    .btn-predict::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .btn-predict:hover::before { left: 100%; }
    .btn-predict:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(201,151,59,0.45);
    }
    .btn-predict:active { transform: translateY(0); }
    .btn-predict:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* 加载动画 */
    .loading {
      display: none;
      text-align: center;
      padding: 30px;
      color: var(--gold);
      letter-spacing: 4px;
      font-size: 15px;
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
      margin-left: 8px;
    }

    .loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* 结果区 */
    .result-section {
      display: none;
      margin-top: 32px;
    }

    .result-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .result-title {
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 5px;
    }

    /* 三词展示 */
    .three-words {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 20px 0 28px;
    }

    .word-card {
      flex: 1;
      text-align: center;
      padding: 18px 10px;
      position: relative;
    }

    .word-card + .word-card::before {
      content: '▶';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--gold);
      opacity: 0.5;
    }

    .word-stage {
      font-size: 11px;
      color: var(--sand-deep);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .word-main {
      font-size: 28px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .word-auspice {
      font-size: 12px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }

    .auspice-ji { color: #4CAF50; background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.3); }
    .auspice-xiong { color: #F44336; background: rgba(244,67,54,0.12); border: 1px solid rgba(244,67,54,0.3); }
    .auspice-ping { color: #FFC107; background: rgba(255,193,7,0.12); border: 1px solid rgba(255,193,7,0.3); }

    /* 结果文本 */
    .result-body {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(201,151,59,0.15);
      border-radius: 3px;
      padding: 24px 28px;
      line-height: 2;
      font-size: 15px;
      letter-spacing: 1px;
      color: var(--sand);
      white-space: pre-wrap;
    }

    .result-body .section-title {
      color: var(--gold);
      font-size: 16px;
      letter-spacing: 3px;
      display: block;
      margin: 12px 0 6px;
    }

    /* Markdown 渲染 */
    .result-body h1, .result-body h2, .result-body h3 {
      color: var(--gold-light);
      letter-spacing: 3px;
      margin: 16px 0 8px;
    }
    .result-body strong, .result-body b {
      color: var(--gold-light);
    }
    .result-body em { color: var(--sand-deep); }
    .result-body hr {
      border: none;
      border-top: 1px solid rgba(201,151,59,0.25);
      margin: 16px 0;
    }
    .result-body p { margin-bottom: 10px; }

    /* 底部 */
    .footer {
      text-align: center;
      padding: 30px 0 10px;
      color: rgba(213,190,152,0.35);
      font-size: 12px;
      letter-spacing: 3px;
    }

    /* 吉凶对应颜色 */
    .word-daan { color: #4CAF50; }
    .word-suxi { color: #4CAF50; }
    .word-xiaoji { color: #8BC34A; }
    .word-tiande { color: #4CAF50; }
    .word-liulian { color: #FFC107; }
    .word-taohua { color: #E91E63; }
    .word-chikou { color: #F44336; }
    .word-kongwang { color: #9C27B0; }
    .word-bingfu { color: #F44336; }

    /* 响应式 */
    @media (max-width: 600px) {
      .main-card { padding: 24px 20px; }
      .logo-badge { font-size: 38px; }
      .three-words { gap: 4px; }
      .word-main { font-size: 22px; }
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--lapis); }
    ::-webkit-scrollbar-thumb { background: var(--gold-deep); border-radius: 3px; }

    /* 流式输出光标 */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="top-border"></div>
<div class="cloud-strip">❧ ✦ ☁ ✦ ❧ ✦ ☁ ✦ ❧ ✦ ☁ ✦ ❧ ✦ ☁ ✦ ❧</div>

<div class="container">
  <div class="header">
    <div class="logo-badge">极速预测</div>
    <div class="subtitle">马前刻 · 万事不决，问大鱼</div>
    <div class="tagline">依天时 · 通人事 · 决疑惑</div>
  </div>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <div class="main-card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="time-display">
      <div class="time-solar" id="solarTime">正在获取时间...</div>
      <div class="time-lunar" id="lunarTime">农历加载中...</div>
    </div>

    <label class="input-label">▸ 请述所问之事</label>
    <div class="input-wrapper">
      <textarea id="questionInput" placeholder="如：此番商谈能否顺利？ / 近日寻职可否有所得？ / 这段感情走向如何？" rows="4"></textarea>

    <button class="btn-predict" id="predictBtn" onclick="doPrediction()">

    </button>

      正在推演天机
      <div class="loading-dots"><span></span><span></span><span></span></div>

  <div class="result-section" id="resultSection">
    <div class="divider"><span class="divider-icon">☽</span></div>

    <div class="main-card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="result-header">
        <div class="result-title">卦象推演</div>
      </div>

      <div class="three-words" id="threeWords"></div>

      <div class="result-body" id="resultBody"></div>
    </div>
  </div>

  <div class="footer">
    天机不可尽泄 · 仅供参考决策 · 命运在己
  </div>
</div>

<script>
// ============================================================
// 农历转换核心算法（完整数据表）
// ============================================================
const lunarInfo = [
  0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
  0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
  0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
  0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
  0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
  0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
  0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
  0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
  0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
  0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06aa0,0x0a6b6,0x056a0,0x02b60,0x09570,
  0x052b3,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,
  0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,
  0x052b0,0x0f930,0x06952,0x0f4a0,0x0b540,0x074e5,0x056a0,0x096d0,0x0c4d5,0x04ad0,
  0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x095a6,0x095b0,0x049b0,0x0a974,
  0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0
];

const Gan = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const Zhi = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const Animals = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
const lunarMonths = ["正","二","三","四","五","六","七","八","九","十","冬","腊"];
const lunarDays = [
  "初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
  "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
  "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"
];
const shiChen = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

function leapMonth(y) { return lunarInfo[y-1900] & 0xf; }
function leapDays(y) {
  if(leapMonth(y)) return (lunarInfo[y-1900] & 0x10000) ? 30 : 29;
  return 0;
}
function monthDays(y, m) {
  return (lunarInfo[y-1900] & (0x10000 >> m)) ? 30 : 29;
}

function solarToLunar(year, month, day) {
  let i, leap = 0, temp = 0;
  const baseDate = new Date(1900, 0, 31);
  const objDate = new Date(year, month-1, day);
  let offset = Math.round((objDate - baseDate) / 86400000);

  let lunarYear;
  for(i = 1900; i < 2100 && offset > 0; i++) {
    temp = 348;
    for(let j = 0x8000; j > 0x8; j >>= 1) {
      temp += (lunarInfo[i-1900] & j) ? 1 : 0;
    }
    temp += leapDays(i);
    offset -= temp;
  }
  if(offset == 0 && leapMonth(i-1) > 0) { leap = leapMonth(i-1); }
  if(offset < 0) { offset += temp; i--; }
  lunarYear = i;

  let leapM = leapMonth(lunarYear);
  let isLeap = false;
  let lunarMonth, lunarDay;

  for(i = 1; i < 13 && offset > 0; i++) {
    if(leapM > 0 && i == (leapM+1) && !isLeap) {
      --i; isLeap = true; temp = leapDays(lunarYear);
    } else {
      temp = monthDays(lunarYear, i);
    }
    if(isLeap && i == (leapM+1)) isLeap = false;
    offset -= temp;
  }
  if(offset == 0 && leapM > 0 && i == leapM+1) {
    if(isLeap) isLeap = false;
    else { isLeap = true; --i; }
  }
  if(offset < 0) { offset += temp; --i; }
  lunarMonth = i;
  lunarDay = offset + 1;

  return { year: lunarYear, month: lunarMonth, day: lunarDay, isLeap };
}

// 时辰转数字 (0-11)
function getShiChenIndex(hour) {
  // 子(23-1):0, 丑(1-3):1, 寅(3-5):2, 卯(5-7):3, 辰(7-9):4
  // 巳(9-11):5, 午(11-13):6, 未(13-15):7, 申(15-17):8, 酉(17-19):9, 戌(19-21):10, 亥(21-23):11
  if(hour >= 23 || hour < 1) return 0;
  return Math.floor((hour + 1) / 2);
}

// 获取时辰名称
function getShiChenName(hour) {
  const names = ["子时","丑时","寅时","卯时","辰时","巳时","午时","未时","申时","酉时","戌时","亥时"];
  return names[getShiChenIndex(hour)];
}

// ============================================================
// 预测算法核心
// ============================================================
const WORDS = ["大安","留连","速喜","赤口","小吉","空亡","病符","桃花","天德"];
const WORD_META = {
  "大安": { color: "word-daan", auspice: "大吉", auspiceClass: "auspice-ji" },
  "留连": { color: "word-liulian", auspice: "中平", auspiceClass: "auspice-ping" },
  "速喜": { color: "word-suxi", auspice: "吉", auspiceClass: "auspice-ji" },
  "赤口": { color: "word-chikou", auspice: "凶", auspiceClass: "auspice-xiong" },
  "小吉": { color: "word-xiaoji", auspice: "小吉", auspiceClass: "auspice-ji" },
  "空亡": { color: "word-kongwang", auspice: "大凶", auspiceClass: "auspice-xiong" },
  "病符": { color: "word-bingfu", auspice: "凶", auspiceClass: "auspice-xiong" },
  "桃花": { color: "word-taohua", auspice: "中性", auspiceClass: "auspice-ping" },
  "天德": { color: "word-tiande", auspice: "吉", auspiceClass: "auspice-ji" }
};

function getWord(index) {
  // 1-based index, 从大安(1)开始循环
  return WORDS[((index - 1) % 9 + 9) % 9];
}

function calcPrediction(lunar) {
  const m = lunar.month;      // 农历月
  const d = lunar.day;        // 农历日
  const t = lunar.shiChen;    // 时辰数 (1-12, 子=1)

  // 原则二：
  // 第一词：按月份数，从大安开始取第m个词
  const idx1 = m;
  // 第二词：日期 + 月份数 - 1
  const idx2 = d + m - 1;
  // 第三词：日期 + 月份数 + 时辰数 - 2
  const idx3 = d + m + t - 2;

  return {
    word1: getWord(idx1),
    word2: getWord(idx2),
    word3: getWord(idx3),
    idx1, idx2, idx3
  };
}

// ============================================================
// 实时时钟
// ============================================================
let currentLunar = null;

function updateClock() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  const hour = now.getHours();
  const minute = now.getMinutes();
  const second = now.getSeconds();

  // 公历显示
  const weekDays = ["日","一","二","三","四","五","六"];
  document.getElementById('solarTime').textContent =
    `公历 ${year}年${month}月${day}日 · 星期${weekDays[now.getDay()]} · ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}:${String(second).padStart(2,'0')}`;

  // 农历
  const lunar = solarToLunar(year, month, day);
  const shiIdx = getShiChenIndex(hour);
  currentLunar = {
    year: lunar.year,
    month: lunar.month,
    day: lunar.day,
    shiChen: shiIdx + 1,   // 1-based
    shiChenName: getShiChenName(hour),
    isLeap: lunar.isLeap,
    hour, minute
  };

  const ganIdx = (lunar.year - 4) % 10;
  const zhiIdx = (lunar.year - 4) % 12;
  const yearName = Gan[((ganIdx % 10) + 10) % 10] + Zhi[((zhiIdx % 12) + 12) % 12];
  const animalName = Animals[((zhiIdx % 12) + 12) % 12];

  document.getElementById('lunarTime').textContent =
    `农历 ${yearName}年（${animalName}年）${lunar.isLeap?'闰':''}${lunarMonths[lunar.month-1]}月${lunarDays[lunar.day-1]} · ${getShiChenName(hour)}`;
}

setInterval(updateClock, 1000);
updateClock();

// ============================================================
// 渲染三词卡片
// ============================================================
function renderThreeWords(pred) {
  const stages = ["初象·起始", "中象·过程", "末象·结果"];
  const words = [pred.word1, pred.word2, pred.word3];
  let html = '';
  words.forEach((w, i) => {
    const meta = WORD_META[w];
    html += `
      <div class="word-card">
        <div class="word-stage">${stages[i]}</div>
        <div class="word-main ${meta.color}">${w}</div>
        <div class="word-auspice ${meta.auspiceClass}">${meta.auspice}</div>
      </div>`;
  });
  document.getElementById('threeWords').innerHTML = html;
}

// ============================================================
// Markdown 简单渲染
// ============================================================
function renderMarkdown(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\n/g, '<br>');
}

// ============================================================
// 主预测函数
// ============================================================
async function doPrediction() {
  const question = document.getElementById('questionInput').value.trim();
  if(!question) {
    document.getElementById('questionInput').focus();
    document.getElementById('questionInput').style.borderColor = 'rgba(192,57,43,0.7)';
    setTimeout(() => {
      document.getElementById('questionInput').style.borderColor = 'rgba(201,151,59,0.3)';
    }, 1500);
    return;
  }

  if(!currentLunar) { alert('时间尚未获取，请稍候'); return; }

  const btn = document.getElementById('predictBtn');
  const loading = document.getElementById('loadingDiv');
  const resultSection = document.getElementById('resultSection');
  const resultBody = document.getElementById('resultBody');

  btn.disabled = true;
  loading.style.display = 'block';
  resultSection.style.display = 'none';

  const pred = calcPrediction(currentLunar);
  renderThreeWords(pred);

  // 构造给 DeepSeek 的 prompt
  const systemPrompt = `你是"万事不决，问大鱼"，一位精通传统命理判断的决策助手。请根据给定的预测结果，用传统命理风格，为用户的问题给出专业、通俗易懂的解析和建议。

输出格式要求（严格遵守）：

**判断依据**
简洁说明当前时间的农历背景（一句话，不透露算法）。

**事情走向**
简洁概括事情整体走向（2-3句）。

**决定建议**
按初象、中象、末象三个阶段，详细阐述事情走向和建议。语言口语化、通俗易懂、富有传统命理色彩。

请勿透露任何算法规则，只给出解析结论和建议。`;

  const userMessage = `当前时间：${document.getElementById('solarTime').textContent}
农历：${document.getElementById('lunarTime').textContent}

用户问题：${question}

卦象结果：
- 初象（起始）：${pred.word1}
- 中象（过程）：${pred.word2}
- 末象（结果）：${pred.word3}

请依据以上卦象，为用户的问题给出专业解析和建议。`;

  try {
    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer sk-2dcd2ddc13484a6ba44ca4028473af78'
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        stream: true,
        max_tokens: 1000,
        temperature: 0.85
      })
    });

    if(!response.ok) {
      throw new Error(`API 响应异常: ${response.status}`);
    }

    loading.style.display = 'none';
    resultSection.style.display = 'block';
    resultBody.innerHTML = '<span class="cursor"></span>';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while(true) {
      const { done, value } = await reader.read();
      if(done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');

      for(const line of lines) {
        if(line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if(data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            if(delta) {
              fullText += delta;
              resultBody.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
              resultBody.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
          } catch(e) {}
        }
      }
    }

    // 移除光标
    resultBody.innerHTML = renderMarkdown(fullText);

  } catch(err) {
    loading.style.display = 'none';
    resultSection.style.display = 'block';
    resultBody.innerHTML = `<span style="color:var(--cinnabar)">⚠ 天机暂时受阻：${err.message}</span><br><br>请稍后再试，或检查网络连接。`;
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

// 回车提交
document.addEventListener('keydown', function(e) {
  if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    doPrediction();
  }
});
</script>
