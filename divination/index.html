<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预极速测 - 万事不决问大鱼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #8b5cf6;
            --primary-glow: #a78bfa;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --dark: #0f0c29;
            --dark-secondary: #302b63;
            --dark-tertiary: #24243e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.5);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(245, 158, 11, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 12, 41, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--primary-glow);
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 24px 60px;
        }
        
        /* 标题区 */
        .hero-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            color: var(--primary-glow);
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        .hero-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .hero-desc {
            font-size: 16px;
            color: var(--text-muted);
        }
        
        /* 输入区 */
        .input-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
        }
        
        .input-label {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .input-wrapper {
            position: relative;
        }
        
        #questionInput {
            width: 100%;
            padding: 20px 24px;
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            resize: none;
            min-height: 120px;
            transition: all 0.3s;
        }
        
        #questionInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        #questionInput::placeholder {
            color: var(--text-muted);
        }
        
        .input-hint {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }
        
        /* 按钮 */
        .submit-btn {
            width: 100%;
            margin-top: 24px;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.6);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 结果区 */
        .result-section {
            display: none;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            color: var(--primary-glow);
        }
        
        /* 判词展示 */
        .divination-words {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        
        .word-card {
            background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.2));
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 16px;
            padding: 24px 32px;
            text-align: center;
            min-width: 120px;
        }
        
        .word-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .word-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .word-meaning {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        /* 结果内容 */
        .result-content {
            space-y: 24px;
        }
        
        .result-block {
            margin-bottom: 24px;
            padding: 24px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }
        
        .result-block:last-child {
            margin-bottom: 0;
        }
        
        .block-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary-glow);
        }
        
        .block-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-secondary);
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(139,92,246,0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--text-secondary);
        }
        
        /* 重新测算按钮 */
        .reset-btn {
            width: 100%;
            margin-top: 24px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reset-btn:hover {
            border-color: var(--primary);
            color: var(--primary-glow);
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 24px;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 32px;
            }
            
            .input-section, .result-section {
                padding: 24px;
            }
            
            .divination-words {
                gap: 12px;
            }
            
            .word-card {
                padding: 16px 24px;
                min-width: 100px;
            }
            
            .word-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <img src="../logo-lobster.jpg" alt="WOWO Claire">
                </div>
                WOWO Claire
            </a>
            <a href="/" class="back-link">← 返回首页</a>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 标题区 -->
        <section class="hero-section">
            <div class="hero-badge">🔮 传统命理决策助手</div>
            <h1 class="hero-title">预极速测</h1>
            <p class="hero-subtitle">万事不决，问大鱼</p>
            <p class="hero-desc">依据当前时间，运用九星推算，精准协助您做出明智决定</p>
        </section>

        <!-- 输入区 -->
        <section class="input-section" id="inputSection">
            <div class="input-label">📝 请输入您想问的事情</div>
            <div class="input-wrapper">
                <textarea id="questionInput" placeholder="例如：今天适合签约吗？ / 这个项目能成功吗？ / 我该不该跳槽？"></textarea>
            </div>
            <div class="input-hint">💡 建议描述具体一些，结果会更加准确</div>
            <button class="submit-btn" id="submitBtn" onclick="startDivination()">🔮 开始测算</button>
        </section>

        <!-- 加载中 -->
        <div class="loading" id="loadingSection">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在推算天机...</div>
        </div>

        <!-- 结果区 -->
        <section class="result-section" id="resultSection">
            <div class="result-title">✨ 测算结果</div>
            
            <div class="divination-words" id="divinationWords">
                <!-- 动态生成 -->
            </div>

            <div class="result-content">
                <div class="result-block">
                    <div class="block-title">📊 事情走向</div>
                    <div class="block-content" id="trendContent"></div>
                </div>
                
                <div class="result-block">
                    <div class="block-title">💡 决定建议</div>
                    <div class="block-content" id="adviceContent"></div>
                </div>
            </div>

            <button class="reset-btn" onclick="resetDivination()">🔄 重新测算</button>
        </section>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 WOWO Claire · 预极速测 · 仅供娱乐参考</p>
    </footer>

    <script>
        // 九星定义
        const stars = [
            { name: '大安', meaning: '稳定长久，事情顺利', luck: '大吉', element: '木', direction: '东方' },
            { name: '留连', meaning: '拖延反复，遇到波折', luck: '中平', element: '土/水', direction: '东南/西南' },
            { name: '速喜', meaning: '快速惊喜，意外收获', luck: '吉', element: '火', direction: '南方' },
            { name: '赤口', meaning: '口舌争斗，是非冲突', luck: '凶', element: '金', direction: '西方' },
            { name: '小吉', meaning: '起步小成，逐步发展', luck: '小吉', element: '水', direction: '北方' },
            { name: '空亡', meaning: '落空虚妄，陷入困境', luck: '大凶', element: '土', direction: '中央' },
            { name: '病符', meaning: '病态异常，不够健康', luck: '凶', element: '土', direction: '西南' },
            { name: '桃花', meaning: '情缘人际，关系相关', luck: '中性', element: '土', direction: '东北' },
            { name: '天德', meaning: '贵人相助，得到支持', luck: '吉', element: '金', direction: '西北' }
        ];

        // 获取农历时间
        function getLunarTime() {
            const now = new Date();
            // 简化计算，使用近似值
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hour = now.getHours();
            
            // 简化的农历转换（实际应该用农历库）
            const lunarMonths = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
            const lunarDays = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                              '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                              '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
            const chineseHours = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
            
            // 简化的农历映射（实际应该根据真实农历）
            const lunarMonth = ((month + 1) % 12) || 12; // 简化处理
            const lunarDay = (day % 30) || 1;
            const lunarHour = Math.floor((hour + 1) / 2) % 12;
            
            return {
                month: lunarMonth,
                day: lunarDay,
                hour: lunarHour + 1, // 时辰从1开始
                monthName: lunarMonths[lunarMonth - 1],
                dayName: lunarDays[lunarDay - 1],
                hourName: chineseHours[lunarHour]
            };
        }

        // 推算九星
        function calculateStars(lunar) {
            const { month, day, hour } = lunar;
            
            // 第一个词：农历月份
            const firstIndex = (month - 1) % 9;
            
            // 第二个词：农历日期 + 月份 - 1
            const secondIndex = (day + month - 2) % 9;
            
            // 第三个词：农历日期 + 月份 + 时辰 - 2
            const thirdIndex = (day + month + hour - 3) % 9;
            
            return [
                { ...stars[firstIndex], position: '起始阶段' },
                { ...stars[secondIndex], position: '中间状态' },
                { ...stars[thirdIndex], position: '最终结果' }
            ];
        }

        // 生成结果描述
        function generateResult(selectedStars, question) {
            const [first, second, third] = selectedStars;
            
            // 事情走向
            let trend = '';
            if (first.luck === '大吉' || first.luck === '吉') {
                trend = '事情开局良好，';
            } else if (first.luck === '凶' || first.luck === '大凶') {
                trend = '事情起步需谨慎，';
            } else {
                trend = '事情开局平稳，';
            }
            
            if (second.luck === '大吉' || second.luck === '吉') {
                trend += '中期发展顺利，';
            } else if (second.luck === '凶' || second.luck === '大凶') {
                trend += '中期可能遇到阻碍，';
            } else {
                trend += '中期需要耐心等待，';
            }
            
            if (third.luck === '大吉' || third.luck === '吉') {
                trend += '最终会有好结果。';
            } else if (third.luck === '凶' || third.luck === '大凶') {
                trend += '最终需要谨慎处理。';
            } else {
                trend += '最终结果中规中矩。';
            }
            
            // 综合建议
            const advice = `根据「${first.name}、${second.name}、${third.name}」的推算结果：

**前期（${first.name}）**：${first.meaning}。建议您在事情初期${first.luck === '大吉' || first.luck === '吉' ? '大胆推进，把握机会' : first.luck === '凶' || first.luck === '大凶' ? '保持谨慎，多做准备' : '稳扎稳打，顺其自然'}。

**中期（${second.name}）**：${second.meaning}。这个阶段${second.luck === '大吉' || second.luck === '吉' ? '会迎来转机或突破' : second.luck === '凶' || second.luck === '大凶' ? '可能遇到挑战或变数' : '需要保持定力和耐心'}。

**后期（${third.name}）**：${third.meaning}。最终结果${third.luck === '大吉' || third.luck === '吉' ? '较为理想，值得期待' : third.luck === '凶' || third.luck === '大凶' ? '不太理想，建议调整策略或另寻时机' : '平平淡淡，无功无过'}。

整体来看，关于「${question}」这件事，${first.luck === '大吉' && third.luck === '大吉' ? '天时地利人和，可以放手一搏' : first.luck === '凶' && third.luck === '凶' ? '时机不太成熟，建议暂缓或放弃' : '有得有失，需要权衡利弊后做出决定'}。`;
            
            return { trend, advice };
        }

        // 开始测算
        function startDivination() {
            const question = document.getElementById('questionInput').value.trim();
            
            if (!question) {
                alert('请输入您想问的事情');
                return;
            }
            
            // 显示加载
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'block';
            
            // 模拟AI处理延迟
            setTimeout(() => {
                const lunar = getLunarTime();
                const selectedStars = calculateStars(lunar);
                const result = generateResult(selectedStars, question);
                
                // 显示判词
                const wordsHtml = selectedStars.map((star, index) => `
                    <div class="word-card">
                        <div class="word-label">${star.position}</div>
                        <div class="word-value">${star.name}</div>
                        <div class="word-meaning">${star.luck}</div>
                    </div>
                `).join('');
                
                document.getElementById('divinationWords').innerHTML = wordsHtml;
                document.getElementById('trendContent').textContent = result.trend;
                document.getElementById('adviceContent').innerHTML = result.advice.replace(/\n/g, '<br>');
                
                // 显示结果
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
            }, 1500);
        }

        // 重新测算
        function resetDivination() {
            document.getElementById('questionInput').value = '';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('inputSection').style.display = 'block';
        }

        // 回车提交
        document.getElementById('questionInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                startDivination();
            }
        });
    </script>
</body>
</html>
