<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WodeClaw AI创作助手 - 小红书/抖音/营销文案一键生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #8b5cf6;
            --primary-glow: #a78bfa;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --success: #10b981;
            --dark: #0f0c29;
            --dark-secondary: #302b63;
            --dark-tertiary: #24243e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.5);
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 12, 41, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--text-primary);
        }
        
        /* 主容器 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 24px 24px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            min-height: 100vh;
        }
        
        /* 侧边栏 - 提示词模板 */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            height: fit-content;
        }
        
        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .template-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .template-item {
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .template-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--glass-border);
        }
        
        .template-item.active {
            background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.2));
            border-color: var(--primary);
        }
        
        .template-icon {
            font-size: 24px;
        }
        
        .template-info {
            flex: 1;
        }
        
        .template-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .template-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        /* 主编辑区 */
        .editor-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 124px);
        }
        
        .editor-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .current-template {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .current-template-icon {
            font-size: 32px;
        }
        
        .current-template-info h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .current-template-info p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 输入区域 */
        .input-section {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .input-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: block;
            color: var(--text-secondary);
        }
        
        .input-textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 15px;
            resize: vertical;
            outline: none;
            font-family: inherit;
        }
        
        .input-textarea:focus {
            border-color: var(--primary);
        }
        
        .input-textarea::placeholder {
            color: var(--text-muted);
        }
        
        /* 参数设置 */
        .params-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .param-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .param-label {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .param-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 150px;
        }
        
        /* 输出区域 */
        .output-section {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .output-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .output-actions {
            display: flex;
            gap: 8px;
        }
        
        .output-textarea {
            flex: 1;
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            color: white;
            font-size: 15px;
            line-height: 1.8;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        
        /* 提示词预览 */
        .prompt-preview {
            padding: 16px 24px;
            background: rgba(245, 158, 11, 0.1);
            border-top: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .prompt-preview-title {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .prompt-preview-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-height: 80px;
            overflow-y: auto;
        }
        
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(15, 12, 41, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            padding: 100px 24px 24px;
            transition: right 0.3s;
            z-index: 999;
            overflow-y: auto;
        }
        
        .settings-panel.open {
            right: 0;
        }
        
        .settings-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        .setting-item {
            margin-bottom: 24px;
        }
        
        .setting-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }
        
        .setting-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .close-settings {
            position: absolute;
            top: 80px;
            right: 24px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 12, 41, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            backdrop-filter: blur(5px);
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span>🦞</span>
                <span>WodeClaw AI创作助手</span>
            </a>
            <div class="nav-links">
                <a href="#" onclick="toggleSettings()">⚙️ API设置</a>
                <a href="/">🏠 返回官网</a>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 侧边栏 - 提示词模板 -->
        <aside class="sidebar">
            <div class="sidebar-title">📋 选择模板</div>
            <div class="template-list" id="templateList">
                <!-- 模板列表由JS生成 -->
            </div>
        </aside>

        <!-- 编辑区 -->
        <main class="editor-container">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>

            <div class="editor-header">
                <div class="current-template">
                    <div class="current-template-icon" id="currentIcon">📝</div>
                    <div class="current-template-info">
                        <h2 id="currentTitle">小红书爆款文案</h2>
                        <p id="currentDesc">生成吸引眼球的小红书种草文案</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
                    <button class="btn btn-primary" id="generateBtn" onclick="generateContent()">
                        ✨ 生成内容
                    </button>
                </div>
            </div>

            <div class="input-section">
                <label class="input-label">输入主题/关键词</label>
                <textarea 
                    class="input-textarea" 
                    id="userInput"
                    placeholder="例如：一款超好用的胶囊酒店，位于深圳中心..."
                ></textarea>
            </div>

            <div class="params-section">
                <div class="param-item">
                    <label class="param-label">语气风格</label>
                    <select class="param-select" id="toneSelect">
                        <option value="friendly">亲切友好</option>
                        <option value="professional">专业正式</option>
                        <option value="humorous">幽默风趣</option>
                        <option value="enthusiastic">热情激昂</option>
                    </select>
                </div>
                <div class="param-item">
                    <label class="param-label">目标受众</label>
                    <select class="param-select" id="audienceSelect">
                        <option value="young">年轻群体</option>
                        <option value="business">商务人士</option>
                        <option value="family">家庭用户</option>
                        <option value="general">大众通用</option>
                    </select>
                </div>
                <div class="param-item">
                    <label class="param-label">内容长度</label>
                    <select class="param-select" id="lengthSelect">
                        <option value="short">简短精炼</option>
                        <option value="medium" selected>中等长度</option>
                        <option value="long">详细完整</option>
                    </select>
                </div>
            </div>

            <div class="output-section">
                <div class="output-label">
                    <span>📝 生成结果</span>
                    <div class="output-actions">
                        <button class="btn btn-secondary" onclick="copyOutput()">📋 复制</button>
                        <button class="btn btn-secondary" onclick="regenerate()">🔄 重新生成</button>
                    </div>
                </div>
                <textarea class="output-textarea" id="outputText" placeholder="点击"生成内容"按钮，AI将为您创作..."></textarea>
            </div>

            <div class="prompt-preview">
                <div class="prompt-preview-title">
                    <span>💡</span>
                    <span>当前使用的提示词模板</span>
                </div>
                <div class="prompt-preview-content" id="promptPreview">
                    你将扮演一位资深的小红书内容创作者，擅长撰写爆款种草文案...
                </div>
            </div>
        </main>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <button class="close-settings" onclick="toggleSettings()">×</button>
        <h2 class="settings-title">⚙️ API 设置</h2>
        
        <div class="setting-item">
            <label class="setting-label">OpenAI API Key</label>
            <input type="password" class="setting-input" id="openaiKey" placeholder="sk-...">
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">API Key 仅保存在本地浏览器中</p>
        </div>
        
        <div class="setting-item">
            <label class="setting-label">API 基础 URL（可选）</label>
            <input type="text" class="setting-input" id="apiBase" placeholder="https://api.openai.com/v1">
        </div>
        
        <div class="setting-item">
            <label class="setting-label">模型选择</label>
            <select class="setting-input" id="modelSelect">
                <option value="gpt-4">GPT-4 (推荐)</option>
                <option value="gpt-3.5-turbo" selected>GPT-3.5 Turbo</option>
            </select>
        </div>
        
        <button class="btn btn-primary" onclick="saveSettings()" style="width: 100%; margin-top: 20px;">
            保存设置
        </button>
    </div>

    <script>
        // 提示词模板库
        const templates = {
            xiaohongshu: {
                icon: '📕',
                name: '小红书爆款文案',
                desc: '生成吸引眼球的小红书种草文案',
                systemPrompt: `你是一位资深的小红书内容创作者，擅长撰写爆款种草文案。

要求：
1. 标题要吸引人，使用emoji增加趣味性
2. 内容真实、生动，避免过度营销
3. 使用小红书风格的语言（"姐妹们"、"yyds"、"绝绝子"等）
4. 分段清晰，每段不宜过长
5. 结尾添加相关话题标签（#标签）
6. 语气亲切自然，像朋友推荐一样

输出格式：
- 标题
- 正文（含emoji）
- 标签`
            },
            douyin: {
                icon: '🎵',
                name: '抖音短视频脚本',
                desc: '创作病毒式传播的短视频脚本',
                systemPrompt: `你是一位抖音短视频脚本创作专家，擅长创作病毒式传播的内容。

要求：
1. 开头3秒要有"钩子"，抓住观众注意力
2. 脚本包含：画面描述、台词/字幕、时长标注
3. 节奏紧凑，避免冗长
4. 适当设置悬念或反转
5. 结尾要有明确的行动号召（点赞/关注/评论）

输出格式：
【视频标题】
【镜头脚本】（分镜号 + 画面 + 台词 + 时长）
【字幕文案】
【话题标签】`
            },
            email: {
                icon: '📧',
                name: '营销邮件模板',
                desc: '撰写高转化率的商务营销邮件',
                systemPrompt: `你是一位专业的营销邮件撰写专家，擅长撰写高转化率的商务邮件。

要求：
1. 主题行简洁有力，打开率要高
2. 开头抓住痛点或利益点
3. 内容结构清晰：问题-解决方案-行动号召
4. 语气专业但不生硬
5. 明确的CTA（Call to Action）
6. 适当的紧迫感或稀缺性

输出格式：
【邮件主题】
【称呼】
【正文】
【落款】`
            },
            product: {
                icon: '📦',
                name: '产品介绍文案',
                desc: '生成打动人心的产品详情页文案',
                systemPrompt: `你是一位资深的产品文案策划，擅长撰写打动人心的产品介绍。

要求：
1. 突出产品核心卖点和差异化优势
2. 使用FAB法则（Feature-特性, Advantage-优势, Benefit-利益）
3. 语言生动形象，唤起用户购买欲望
4. 包含使用场景和情感共鸣
5. 结构清晰：标题-痛点-解决方案-产品优势-行动号召

输出格式：
【主标题】
【副标题/卖点】
【痛点引入】
【解决方案】
【核心卖点】（3-5点）
【行动号召】`
            },
            social: {
                icon: '💬',
                name: '社交媒体推文',
                desc: '适合微博、朋友圈的短内容',
                systemPrompt: `你是一位社交媒体运营专家，擅长撰写高互动的短内容。

要求：
1. 内容精炼，适合快速阅读
2. 使用 emoji 增加视觉吸引力
3. 适当使用网络热词
4. 引发共鸣或互动（提问、投票等）
5. 根据平台特点调整（微博140字风格/朋友圈轻松风格）

输出格式：
【正文内容】（含emoji）
【话题标签】
【配图建议】`
            },
            slogan: {
                icon: '🎯',
                name: '品牌口号/Slogan',
                desc: '创作令人难忘的品牌标语',
                systemPrompt: `你是一位品牌策略专家，擅长创作简洁有力的品牌口号。

要求：
1. 简洁易记，最好不超过10个字
2. 体现品牌核心价值
3. 有韵律感，朗朗上口
4. 差异化，与竞品区分
5. 提供多个选项供选择

输出格式：
【主推口号】（3-5个选项）
【副推口号】（备选方案）
【创作思路说明】`
            },
            seo: {
                icon: '🔍',
                name: 'SEO文章写作',
                desc: '生成搜索引擎友好的文章',
                systemPrompt: `你是一位SEO内容专家，擅长撰写搜索引擎友好的文章。

要求：
1. 文章结构清晰（H1-H2-H3标题层级）
2. 关键词自然融入，密度合理
3. 开头包含核心关键词
4. 内容有价值，解决用户问题
5. 适当添加内部链接建议
6. 字数800-1500字

输出格式：
【文章标题】（含关键词）
【Meta描述】
【正文】（含HTML标签建议）
【关键词布局建议】`
            }
        };

        let currentTemplate = 'xiaohongshu';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderTemplateList();
            loadSettings();
            updatePromptPreview();
        });

        // 渲染模板列表
        function renderTemplateList() {
            const list = document.getElementById('templateList');
            list.innerHTML = Object.entries(templates).map(([key, template]) => `
                <div class="template-item ${key === currentTemplate ? 'active' : ''}" 
                     onclick="selectTemplate('${key}')">
                    <div class="template-icon">${template.icon}</div>
                    <div class="template-info">
                        <div class="template-name">${template.name}</div>
                        <div class="template-desc">${template.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        // 选择模板
        function selectTemplate(key) {
            currentTemplate = key;
            const template = templates[key];
            
            document.getElementById('currentIcon').textContent = template.icon;
            document.getElementById('currentTitle').textContent = template.name;
            document.getElementById('currentDesc').textContent = template.desc;
            
            renderTemplateList();
            updatePromptPreview();
        }

        // 更新提示词预览
        function updatePromptPreview() {
            const preview = document.getElementById('promptPreview');
            preview.textContent = templates[currentTemplate].systemPrompt;
        }

        // 生成内容
        async function generateContent() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) {
                alert('请输入主题/关键词');
                return;
            }

            const apiKey = localStorage.getItem('openaiKey');
            if (!apiKey) {
                alert('请先设置 API Key');
                toggleSettings();
                return;
            }

            const loadingOverlay = document.getElementById('loadingOverlay');
            const generateBtn = document.getElementById('generateBtn');
            
            loadingOverlay.classList.add('active');
            generateBtn.disabled = true;

            try {
                const response = await callAI(input);
                document.getElementById('outputText').value = response;
            } catch (error) {
                alert('生成失败：' + error.message);
            } finally {
                loadingOverlay.classList.remove('active');
                generateBtn.disabled = false;
            }
        }

        // 调用AI
        async function callAI(userInput) {
            const apiKey = localStorage.getItem('openaiKey');
            const apiBase = localStorage.getItem('apiBase') || 'https://api.openai.com/v1';
            const model = localStorage.getItem('model') || 'gpt-3.5-turbo';
            
            const tone = document.getElementById('toneSelect').value;
            const audience = document.getElementById('audienceSelect').value;
            const length = document.getElementById('lengthSelect').value;
            
            const systemPrompt = templates[currentTemplate].systemPrompt + `

额外要求：
- 语气风格：${tone}
- 目标受众：${audience}
- 内容长度：${length}`;

            const response = await fetch(`${apiBase}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userInput }
                    ],
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                throw new Error('API 请求失败');
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        // 复制输出
        function copyOutput() {
            const output = document.getElementById('outputText');
            output.select();
            document.execCommand('copy');
            alert('已复制到剪贴板！');
        }

        // 重新生成
        function regenerate() {
            generateContent();
        }

        // 清空
        function clearAll() {
            document.getElementById('userInput').value = '';
            document.getElementById('outputText').value = '';
        }

        // 切换设置面板
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('open');
        }

        // 保存设置
        function saveSettings() {
            localStorage.setItem('openaiKey', document.getElementById('openaiKey').value);
            localStorage.setItem('apiBase', document.getElementById('apiBase').value);
            localStorage.setItem('model', document.getElementById('modelSelect').value);
            alert('设置已保存！');
            toggleSettings();
        }

        // 加载设置
        function loadSettings() {
            document.getElementById('openaiKey').value = localStorage.getItem('openaiKey') || '';
            document.getElementById('apiBase').value = localStorage.getItem('apiBase') || '';
            document.getElementById('modelSelect').value = localStorage.getItem('model') || 'gpt-3.5-turbo';
        }
    </script>
</body>
</html>
